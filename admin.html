<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>key system // manual activation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #0a0e12;
            font-family: 'Segoe UI', 'Tahoma', 'Courier New', monospace;
            min-height: 100vh;
            padding: 25px;
        }
        
        .window {
            max-width: 550px;
            margin: 60px auto;
            background: #1a1f24;
            border: 1px solid #00BFFF;
            border-radius: 4px;
        }
        
        .window-header {
            background: #0f1318;
            padding: 12px 18px;
            border-bottom: 1px solid #00BFFF;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00BFFF;
        }
        
        .window-content {
            padding: 25px;
        }
        
        .info-box {
            background: #0f1318;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #8a8f99;
            border-left: 2px solid #00BFFF;
        }
        
        input {
            width: 100%;
            padding: 10px;
            background: #0f1318;
            border: 1px solid #2a2f35;
            color: #c8ccd4;
            font-family: monospace;
            font-size: 13px;
            margin: 8px 0;
        }
        
        input:focus {
            outline: none;
            border-color: #00BFFF;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #0f1318;
            border: 1px solid #00BFFF;
            color: #00BFFF;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        
        button:hover {
            background: #00BFFF;
            color: #0a0e12;
        }
        
        .result-area {
            margin-top: 20px;
            padding: 12px;
            background: #0f1318;
            border-left: 2px solid #2a2f35;
            font-family: monospace;
            font-size: 12px;
        }
        
        hr {
            border-color: #2a2f35;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="window-header">// MANUAL KEY ACTIVATION //</div>
        <div class="window-content">
            <div class="info-box">
                > step 1: get user id from roblox script display<br>
                > step 2: get hwid from discord webhook<br>
                > step 3: enter key from your database<br>
                > step 4: click activate
            </div>
            
            <input type="password" id="adminPass" placeholder="admin password">
            <input type="text" id="keyInput" placeholder="key (e.g., DAY_4kD92jsL0aQpZx1M)">
            <input type="number" id="userId" placeholder="user id">
            <input type="text" id="hwid" placeholder="hwid from discord">
            
            <button id="activateBtn">ACTIVATE KEY</button>
            
            <div id="resultArea" class="result-area">waiting for input...</div>
        </div>
    </div>

    <script>
        const activateBtn = document.getElementById('activateBtn');
        const resultArea = document.getElementById('resultArea');
        
        activateBtn.onclick = async function() {
            const adminPass = document.getElementById('adminPass').value;
            const key = document.getElementById('keyInput').value;
            const userId = document.getElementById('userId').value;
            const hwid = document.getElementById('hwid').value;
            
            if (!adminPass || !key || !userId || !hwid) {
                resultArea.innerHTML = "[ERROR] fill all fields";
                resultArea.style.borderLeftColor = "#ff4444";
                return;
            }
            
            if (adminPass !== "$xen$4295") {
                resultArea.innerHTML = "[ERROR] invalid admin password";
                resultArea.style.borderLeftColor = "#ff4444";
                return;
            }
            
            resultArea.innerHTML = "[PROCESSING] sending request...";
            resultArea.style.borderLeftColor = "#ffaa44";
            
            try {
                const response = await fetch('/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        key: key, 
                        userId: parseInt(userId), 
                        hwid: hwid, 
                        adminPassword: adminPass 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultArea.innerHTML = "[SUCCESS] " + data.message;
                    resultArea.style.borderLeftColor = "#00BFFF";
                    document.getElementById('keyInput').value = '';
                    document.getElementById('userId').value = '';
                    document.getElementById('hwid').value = '';
                } else {
                    resultArea.innerHTML = "[FAILED] " + data.message;
                    resultArea.style.borderLeftColor = "#ff4444";
                }
            } catch (err) {
                resultArea.innerHTML = "[ERROR] " + err.message;
                resultArea.style.borderLeftColor = "#ff4444";
            }
        };
    </script>
</body>
</html>
