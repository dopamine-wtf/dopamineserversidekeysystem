<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>key system // control panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #0a0e12;
            font-family: 'Segoe UI', 'Tahoma', 'Courier New', monospace;
            min-height: 100vh;
            padding: 25px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .login-window, .dashboard-window {
            background: #1a1f24;
            border: 1px solid #00BFFF;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0,191,255,0.2);
        }
        
        .window-header {
            background: #0f1318;
            padding: 10px 15px;
            border-bottom: 1px solid #00BFFF;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #00BFFF;
        }
        
        .window-content {
            padding: 25px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #0f1318;
            border-left: 3px solid #00BFFF;
            padding: 15px;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #00BFFF;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8a8f99;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        
        .key-list {
            margin-top: 20px;
        }
        
        .key-header {
            background: #0f1318;
            padding: 10px;
            font-size: 12px;
            color: #00BFFF;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2f35;
            margin-top: 20px;
        }
        
        .key-item {
            background: #151a20;
            padding: 12px;
            margin: 8px 0;
            border-left: 2px solid #00BFFF;
            font-size: 12px;
        }
        
        .key-line {
            color: #c8ccd4;
            margin: 4px 0;
            font-family: monospace;
        }
        
        .key-value {
            color: #00BFFF;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 10px;
            background: #0f1318;
            border: 1px solid #2a2f35;
            color: #c8ccd4;
            font-family: monospace;
            font-size: 14px;
            margin: 8px 0;
        }
        
        input:focus {
            outline: none;
            border-color: #00BFFF;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: #0f1318;
            border: 1px solid #00BFFF;
            color: #00BFFF;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: 0.2s;
        }
        
        button:hover {
            background: #00BFFF;
            color: #0a0e12;
        }
        
        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
        }
        
        hr {
            border-color: #2a2f35;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const requiredPassword = "$xen$4295";
        let keyDatabase = {};

        function initKeys() {
            const keys = [
                "DAY_4kD92jsL0aQpZx1M", "DAY_a8Fj2L0qWmZxP9sT", "DAY_Zx91LmQa2P0kFsD3",
                "DAY_2kLmP0sQ9ZxFj8Ta", "DAY_sD8F2LmQ0ZxPa9k1", "DAY_0ZxPqLmF2a9sD8kJ",
                "DAY_kLm2ZxP9sD0FqA8J", "DAY_9sD2LmF0ZxPkQ8Ja", "DAY_F2LmZx0P9kQsD8Aj",
                "DAY_LmZxP0F2k9sDQa8J", "DAY_Q2ZxLmP9F0sD8kAj", "DAY_8LmF2ZxQ0P9sDkAj",
                "3DAY_2kLmP0sQ9ZxFj8Ta", "3DAY_Zx91LmQa2P0kFsD3", "3DAY_a8Fj2L0qWmZxP9sT",
                "3DAY_4kD92jsL0aQpZx1M", "3DAY_sD8F2LmQ0ZxPa9k1", "3DAY_kLm2ZxP9sD0FqA8J",
                "WEEK_4kD92jsL0aQpZx1M", "WEEK_a8Fj2L0qWmZxP9sT", "WEEK_Zx91LmQa2P0kFsD3",
                "WEEK_2kLmP0sQ9ZxFj8Ta", "WEEK_sD8F2LmQ0ZxPa9k1", "WEEK_kLm2ZxP9sD0FqA8J",
                "MONTH_4kD92jsL0aQpZx1M", "MONTH_a8Fj2L0qWmZxP9sT", "MONTH_Zx91LmQa2P0kFsD3",
                "MONTH_2kLmP0sQ9ZxFj8Ta", "MONTH_sD8F2LmQ0ZxPa9k1", "MONTH_kLm2ZxP9sD0FqA8J",
                "3MONTH_4kD92jsL0aQpZx1M", "3MONTH_a8Fj2L0qWmZxP9sT", "3MONTH_Zx91LmQa2P0kFsD3",
                "3MONTH_2kLmP0sQ9ZxFj8Ta", "3MONTH_sD8F2LmQ0ZxPa9k1", "3MONTH_kLm2ZxP9sD0FqA8J",
                "YEAR_4kD92jsL0aQpZx1M", "YEAR_a8Fj2L0qWmZxP9sT", "YEAR_Zx91LmQa2P0kFsD3",
                "YEAR_2kLmP0sQ9ZxFj8Ta", "YEAR_sD8F2LmQ0ZxPa9k1",
                "LIFETIME_4kD92jsL0aQpZx1M", "LIFETIME_a8Fj2L0qWmZxP9sT", "LIFETIME_Zx91LmQa2P0kFsD3",
                "LIFETIME_2kLmP0sQ9ZxFj8Ta", "LIFETIME_sD8F2LmQ0ZxPa9k1", "LIFETIME_kLm2ZxP9sD0FqA8J",
                "DEV_x9K2LmQ7aP3zT8vR", "DEV_bF6rN1XqW4mZ8sJ2", "DEV_T7pL2cV9dK5xQ1nA",
                "DEV_H3sY8mR6Zq2Pj4XK", "DEV_U9dQ1aW7cF5Lx2Vz",
                "TRIAL_4kD92jsL0aQpZx1M", "TRIAL_8LmQ2sVx7A1kZpR3", "TRIAL_W9cX5mT2aQ7LpK1Z",
                "MEDIA_P7xQ2L9Z1mA5V3K8", "MEDIA_A2Z9L7Q5X1mP3V8K", "MEDIA_X5Q1Z9L2mA7P3V8K"
            ];
            
            for (let i = 0; i < keys.length; i++) {
                let keyType = "DAY";
                let durationDays = 1;
                let k = keys[i];
                
                if (k.startsWith("3DAY")) { keyType = "3DAY"; durationDays = 3; }
                else if (k.startsWith("WEEK")) { keyType = "WEEK"; durationDays = 7; }
                else if (k.startsWith("MONTH")) { keyType = "MONTH"; durationDays = 30; }
                else if (k.startsWith("3MONTH")) { keyType = "3MONTH"; durationDays = 90; }
                else if (k.startsWith("YEAR")) { keyType = "YEAR"; durationDays = 365; }
                else if (k.startsWith("LIFETIME")) { keyType = "LIFETIME"; durationDays = -1; }
                else if (k.startsWith("DEV")) { keyType = "DEV"; durationDays = -1; }
                else if (k.startsWith("TRIAL")) { keyType = "TRIAL"; durationDays = 1; }
                else if (k.startsWith("MEDIA")) { keyType = "MEDIA"; durationDays = 7; }
                
                keyDatabase[k] = {
                    key: k,
                    type: keyType,
                    duration: durationDays,
                    approved: false,
                    hwid: null,
                    userId: null,
                    activatedAt: null
                };
            }
        }

        function getTimeRemaining(activatedAt, duration) {
            if (duration === -1) return "LIFETIME";
            if (!activatedAt) return "PENDING";
            const expireTime = activatedAt + (duration * 24 * 60 * 60 * 1000);
            const remaining = expireTime - Date.now();
            if (remaining <= 0) return "EXPIRED";
            const days = Math.floor(remaining / (24 * 60 * 60 * 1000));
            const hours = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            return days + "d " + hours + "h";
        }

        function renderDashboard() {
            const app = document.getElementById('app');
            const approved = Object.values(keyDatabase).filter(k => k.approved);
            const pending = Object.values(keyDatabase).filter(k => !k.approved);
            
            let html = `
                <div class="dashboard-window">
                    <div class="window-header">// KEY SYSTEM // CONTROL PANEL //</div>
                    <div class="window-content">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${Object.keys(keyDatabase).length}</div>
                                <div class="stat-label">TOTAL KEYS</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${approved.length}</div>
                                <div class="stat-label">ACTIVATED</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${pending.length}</div>
                                <div class="stat-label">PENDING</div>
                            </div>
                        </div>
                        
                        <div class="key-list">
                            <div class="key-header">>> ACTIVATED KEYS [${approved.length}]</div>
            `;
            
            for (let i = 0; i < approved.length; i++) {
                const k = approved[i];
                const timeLeft = getTimeRemaining(k.activatedAt, k.duration);
                const expired = k.activatedAt && (k.activatedAt + (k.duration * 24 * 60 * 60 * 1000)) <= Date.now();
                html += `
                    <div class="key-item" style="border-left-color: ${expired ? '#ff4444' : '#00BFFF'}">
                        <div class="key-line"><span class="key-value">${k.key}</span> [${k.type}]</div>
                        <div class="key-line">USER: ${k.userId || 'none'} | HWID: ${k.hwid ? k.hwid.substring(0, 20)+'...' : 'none'}</div>
                        <div class="key-line">STATUS: ${timeLeft}</div>
                    </div>
                `;
            }
            
            html += `<div class="key-header" style="margin-top: 20px;">>> PENDING KEYS [${pending.length}]</div>`;
            
            for (let i = 0; i < Math.min(pending.length, 30); i++) {
                const k = pending[i];
                html += `
                    <div class="key-item">
                        <div class="key-line"><span class="key-value">${k.key}</span> [${k.type}]</div>
                        <div class="key-line">STATUS: waiting for activation</div>
                    </div>
                `;
            }
            
            if (pending.length > 30) {
                html += `<div class="key-item">... and ${pending.length - 30} more keys</div>`;
            }
            
            html += `</div></div></div>`;
            app.innerHTML = html;
        }

        function showLogin() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-window" style="max-width: 400px; margin: 80px auto;">
                    <div class="window-header">// AUTHENTICATION REQUIRED //</div>
                    <div class="window-content">
                        <input type="password" id="passInput" placeholder="enter admin password" autofocus>
                        <button id="authBtn">AUTHORIZE</button>
                        <div id="errorMsg" class="error-msg"></div>
                    </div>
                </div>
            `;
            
            document.getElementById('authBtn').onclick = function() {
                const pass = document.getElementById('passInput').value;
                if (pass === requiredPassword) {
                    initKeys();
                    renderDashboard();
                    setInterval(function() {
                        if (document.querySelector('.dashboard-window')) renderDashboard();
                    }, 10000);
                } else {
                    document.getElementById('errorMsg').innerText = 'access denied // invalid password';
                    setTimeout(function() {
                        showLogin();
                    }, 2000);
                }
            };
        }
        
        showLogin();
    </script>
</body>
</html>
