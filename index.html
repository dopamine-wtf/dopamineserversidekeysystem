<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .login-box, .dashboard {
            background: rgba(0,0,0,0.9);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 30px; text-shadow: 0 0 10px #00ff00; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #00cc00; }
        .key-card {
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .key-header {
            font-weight: bold;
            color: #00ff00;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .key-detail { margin: 5px 0; font-size: 14px; }
        .warning { color: #ff0000; }
        .success { color: #00ff00; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: #000;
            border: 1px solid #00ff00;
            padding: 15px;
            text-align: center;
        }
        .error { color: #ff0000; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        // Password protection
        const REQUIRED_PASSWORD = "$xen$4295";
        
        // Key database (in production, this would be a backend)
        let keyDatabase = {};
        
        // Initialize keys from the provided list
        function initializeKeys() {
            const dayKeys = [
                "DAY_4kD92jsL0aQpZx1M", "DAY_a8Fj2L0qWmZxP9sT", "DAY_Zx91LmQa2P0kFsD3",
                "DAY_2kLmP0sQ9ZxFj8Ta", "DAY_sD8F2LmQ0ZxPa9k1", "DAY_0ZxPqLmF2a9sD8kJ",
                "DAY_kLm2ZxP9sD0FqA8J", "DAY_9sD2LmF0ZxPkQ8Ja", "DAY_F2LmZx0P9kQsD8Aj",
                "DAY_LmZxP0F2k9sDQa8J", "DAY_Q2ZxLmP9F0sD8kAj", "DAY_8LmF2ZxQ0P9sDkAj",
                "DAY_0PZx2LmFQ9sDkA8J", "DAY_kAj8ZxP2LmF0QsD9", "DAY_2LmFZxQ0kP9sD8Aj",
                "DAY_FZx2LmP0k9QsD8Aj", "DAY_9ZxF2LmQ0kP8sDAj", "DAY_LmFZx0kP2Q9sD8Aj",
                "DAY_ZxLmF2Q0kP9sD8Aj", "DAY_2ZxLmF0kP9QsD8Aj", "DAY_F0ZxLm2kP9QsD8Aj",
                "DAY_kP2ZxLmF0Q9sD8Aj", "DAY_8AjZx2LmF0kP9QsD", "DAY_0kZxLmF2P9QsD8Aj",
                "DAY_LmF2ZxkP0Q9sD8Aj", "DAY_2kZxLmF0P9QsD8Aj", "DAY_F2ZxLm0kP9QsD8Aj",
                "DAY_ZxLmF2kP0Q9sD8Aj", "DAY_0ZxLmF2kP9QsD8Aj", "DAY_LmF2Zx0kP9QsD8Aj",
                "DAY_ZxLmF0kP2QsD9A8j", "DAY_2LmZxF0kP9QsD8Aj", "DAY_8AjZxLmF2kP0QsD9",
                "DAY_kP2ZxLmF0QsD9A8j", "DAY_LmF2Zx0kP9QsD8Aj", "DAY_ZxLmF2kP0QsD9A8j"
            ];
            
            const threeDayKeys = [
                "3DAY_2kLmP0sQ9ZxFj8Ta", "3DAY_Zx91LmQa2P0kFsD3", "3DAY_a8Fj2L0qWmZxP9sT",
                "3DAY_4kD92jsL0aQpZx1M", "3DAY_sD8F2LmQ0ZxPa9k1", "3DAY_kLm2ZxP9sD0FqA8J"
            ];
            
            const weekKeys = [
                "WEEK_4kD92jsL0aQpZx1M", "WEEK_a8Fj2L0qWmZxP9sT", "WEEK_Zx91LmQa2P0kFsD3",
                "WEEK_2kLmP0sQ9ZxFj8Ta", "WEEK_sD8F2LmQ0ZxPa9k1", "WEEK_kLm2ZxP9sD0FqA8J"
            ];
            
            const monthKeys = [
                "MONTH_4kD92jsL0aQpZx1M", "MONTH_a8Fj2L0qWmZxP9sT", "MONTH_Zx91LmQa2P0kFsD3",
                "MONTH_2kLmP0sQ9ZxFj8Ta", "MONTH_sD8F2LmQ0ZxPa9k1", "MONTH_kLm2ZxP9sD0FqA8J"
            ];
            
            const threeMonthKeys = [
                "3MONTH_4kD92jsL0aQpZx1M", "3MONTH_a8Fj2L0qWmZxP9sT", "3MONTH_Zx91LmQa2P0kFsD3",
                "3MONTH_2kLmP0sQ9ZxFj8Ta", "3MONTH_sD8F2LmQ0ZxPa9k1", "3MONTH_kLm2ZxP9sD0FqA8J"
            ];
            
            const yearKeys = [
                "YEAR_4kD92jsL0aQpZx1M", "YEAR_a8Fj2L0qWmZxP9sT", "YEAR_Zx91LmQa2P0kFsD3",
                "YEAR_2kLmP0sQ9ZxFj8Ta", "YEAR_sD8F2LmQ0ZxPa9k1"
            ];
            
            const lifetimeKeys = [
                "LIFETIME_4kD92jsL0aQpZx1M", "LIFETIME_a8Fj2L0qWmZxP9sT", "LIFETIME_Zx91LmQa2P0kFsD3",
                "LIFETIME_2kLmP0sQ9ZxFj8Ta", "LIFETIME_sD8F2LmQ0ZxPa9k1", "LIFETIME_kLm2ZxP9sD0FqA8J"
            ];
            
            const devKeys = [
                "DEV_x9K2LmQ7aP3zT8vR", "DEV_bF6rN1XqW4mZ8sJ2", "DEV_T7pL2cV9dK5xQ1nA",
                "DEV_H3sY8mR6Zq2Pj4XK", "DEV_U9dQ1aW7cF5Lx2Vz"
            ];
            
            const trialKeys = [
                "TRIAL_4kD92jsL0aQpZx1M", "TRIAL_8LmQ2sVx7A1kZpR3", "TRIAL_W9cX5mT2aQ7LpK1Z"
            ];
            
            const mediaKeys = [
                "MEDIA_P7xQ2L9Z1mA5V3K8", "MEDIA_A2Z9L7Q5X1mP3V8K", "MEDIA_X5Q1Z9L2mA7P3V8K"
            ];
            
            // Combine all keys
            const allKeys = [...dayKeys, ...threeDayKeys, ...weekKeys, ...monthKeys, 
                           ...threeMonthKeys, ...yearKeys, ...lifetimeKeys, ...devKeys, 
                           ...trialKeys, ...mediaKeys];
            
            // Initialize database
            allKeys.forEach(key => {
                let type = "DAY";
                let duration = 1;
                
                if (key.startsWith("3DAY")) { type = "3DAY"; duration = 3; }
                else if (key.startsWith("WEEK")) { type = "WEEK"; duration = 7; }
                else if (key.startsWith("MONTH")) { type = "MONTH"; duration = 30; }
                else if (key.startsWith("3MONTH")) { type = "3MONTH"; duration = 90; }
                else if (key.startsWith("YEAR")) { type = "YEAR"; duration = 365; }
                else if (key.startsWith("LIFETIME")) { type = "LIFETIME"; duration = -1; }
                else if (key.startsWith("DEV")) { type = "DEV"; duration = -1; }
                else if (key.startsWith("TRIAL")) { type = "TRIAL"; duration = 1; }
                else if (key.startsWith("MEDIA")) { type = "MEDIA"; duration = 7; }
                
                keyDatabase[key] = {
                    key: key,
                    type: type,
                    duration: duration,
                    used: false,
                    hwid: null,
                    createdAt: Date.now(),
                    expiresAt: duration === -1 ? null : Date.now() + (duration * 24 * 60 * 60 * 1000)
                };
            });
        }
        
        // Calculate time left
        function getTimeLeft(expiresAt) {
            if (!expiresAt) return "LIFETIME/DEV";
            const remaining = expiresAt - Date.now();
            if (remaining <= 0) return "EXPIRED";
            const days = Math.floor(remaining / (24 * 60 * 60 * 1000));
            const hours = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            return `${days}d ${hours}h`;
        }
        
        // Render dashboard
        function renderDashboard() {
            const app = document.getElementById('app');
            const usedKeys = Object.values(keyDatabase).filter(k => k.used);
            const unusedKeys = Object.values(keyDatabase).filter(k => !k.used);
            
            let html = `
                <div class="dashboard">
                    <h1>🔑 Key System Dashboard</h1>
                    <div class="stats">
                        <div class="stat-box">Total Keys: ${Object.keys(keyDatabase).length}</div>
                        <div class="stat-box">Used Keys: ${usedKeys.length}</div>
                        <div class="stat-box">Unused Keys: ${unusedKeys.length}</div>
                        <div class="stat-box">Active Users: ${usedKeys.filter(k => !k.expiresAt || k.expiresAt > Date.now()).length}</div>
                    </div>
                    
                    <h2>✅ Used Keys</h2>
            `;
            
            usedKeys.forEach(key => {
                const timeLeft = getTimeLeft(key.expiresAt);
                const expired = key.expiresAt && key.expiresAt <= Date.now();
                html += `
                    <div class="key-card" style="border-color: ${expired ? '#ff0000' : '#00ff00'}">
                        <div class="key-header">${key.key} (${key.type})</div>
                        <div class="key-detail">🔒 HWID Locked: ${key.hwid || 'Not locked yet'}</div>
                        <div class="key-detail">⏱️ Time Left: ${timeLeft}</div>
                        <div class="key-detail">📅 Created: ${new Date(key.createdAt).toLocaleString()}</div>
                        ${key.expiresAt ? `<div class="key-detail">⏰ Expires: ${new Date(key.expiresAt).toLocaleString()}</div>` : ''}
                    </div>
                `;
            });
            
            html += `<h2>❌ Unused Keys</h2>`;
            unusedKeys.slice(0, 50).forEach(key => {
                html += `
                    <div class="key-card">
                        <div class="key-header">${key.key} (${key.type})</div>
                        <div class="key-detail">Status: Available</div>
                    </div>
                `;
            });
            
            if (unusedKeys.length > 50) {
                html += `<div class="key-card">... and ${unusedKeys.length - 50} more keys</div>`;
            }
            
            html += `</div>`;
            app.innerHTML = html;
        }
        
        // Login page
        function showLogin() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-box">
                    <h1>🔐 Admin Access Required</h1>
                    <input type="password" id="password" placeholder="Enter admin password" autofocus>
                    <button onclick="checkPassword()">Authenticate</button>
                    <div id="error" class="error"></div>
                </div>
            `;
        }
        
        // Check password
        window.checkPassword = function() {
            const password = document.getElementById('password').value;
            if (password === REQUIRED_PASSWORD) {
                initializeKeys();
                renderDashboard();
                setInterval(() => {
                    if (document.querySelector('.dashboard')) renderDashboard();
                }, 10000);
            } else {
                document.getElementById('error').innerText = 'Invalid password! Access denied.';
                setTimeout(() => {
                    showLogin();
                }, 2000);
            }
        };
        
        // Start
        showLogin();
    </script>
</body>
</html>
